# Prometheus告警规则
# AI-Rust项目监控告警配置

groups:
  # API服务告警规则
  - name: ai_rust_api_alerts
    interval: 30s
    rules:
      # 高错误率告警
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_failed_total[5m]) 
            / 
            rate(http_requests_total[5m])
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
          
      # 严重错误率告警
      - alert: CriticalErrorRate
        expr: |
          (
            rate(http_requests_failed_total[5m]) 
            / 
            rate(http_requests_total[5m])
          ) > 0.10
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # 高延迟告警
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }} (threshold: 1s)"

      # 严重延迟告警
      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket[5m])
          ) > 3.0
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Critical API latency detected"
          description: "P95 latency is {{ $value | humanizeDuration }} (threshold: 3s)"

      # 低吞吐量告警
      - alert: LowThroughput
        expr: rate(http_requests_total[5m]) < 10
        for: 10m
        labels:
          severity: info
          component: api
        annotations:
          summary: "Low throughput detected"
          description: "Request rate is {{ $value | humanize }} req/s (threshold: 10 req/s)"

  # 推理服务告警规则
  - name: inference_alerts
    interval: 30s
    rules:
      # 推理失败率告警
      - alert: HighInferenceFailureRate
        expr: |
          (
            rate(inference_errors_total[5m]) 
            / 
            rate(inference_requests_total[5m])
          ) > 0.02
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "High inference failure rate"
          description: "Inference failure rate is {{ $value | humanizePercentage }} (threshold: 2%)"

      # 推理延迟告警
      - alert: SlowInference
        expr: |
          histogram_quantile(0.99, 
            rate(inference_duration_seconds_bucket[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Slow inference detected"
          description: "P99 inference latency is {{ $value | humanizeDuration }} (threshold: 500ms)"

      # 批处理队列积压告警
      - alert: BatchQueueBacklog
        expr: batch_queue_size > 100
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Batch queue backlog detected"
          description: "Queue size is {{ $value }} (threshold: 100)"

  # 资源使用告警规则
  - name: resource_alerts
    interval: 30s
    rules:
      # 高内存使用告警
      - alert: HighMemoryUsage
        expr: |
          (
            process_resident_memory_bytes 
            / 
            (8 * 1024 * 1024 * 1024)
          ) > 0.80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 80%)"

      # 严重内存使用告警
      - alert: CriticalMemoryUsage
        expr: |
          (
            process_resident_memory_bytes 
            / 
            (8 * 1024 * 1024 * 1024)
          ) > 0.90
        for: 2m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is {{ $value | humanizePercentage }} (threshold: 90%)"

      # 高CPU使用告警
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 3.5
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }} cores (threshold: 3.5 cores)"

      # 高线程数告警
      - alert: HighThreadCount
        expr: process_threads > 500
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High thread count detected"
          description: "Thread count is {{ $value }} (threshold: 500)"

      # 文件描述符耗尽告警
      - alert: FileDescriptorExhaustion
        expr: |
          (
            process_open_fds 
            / 
            process_max_fds
          ) > 0.80
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "File descriptor exhaustion warning"
          description: "FD usage is {{ $value | humanizePercentage }} (threshold: 80%)"

  # 服务健康告警规则
  - name: service_health_alerts
    interval: 30s
    rules:
      # 服务下线告警
      - alert: ServiceDown
        expr: up{job="ai-rust-api"} == 0
        for: 1m
        labels:
          severity: critical
          component: service
        annotations:
          summary: "Service is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute"

      # 服务重启告警
      - alert: ServiceRestarted
        expr: changes(process_start_time_seconds[5m]) > 0
        for: 1m
        labels:
          severity: info
          component: service
        annotations:
          summary: "Service has been restarted"
          description: "{{ $labels.instance }} was restarted in the last 5 minutes"

      # 健康检查失败告警
      - alert: HealthCheckFailing
        expr: health_check_status != 1
        for: 3m
        labels:
          severity: warning
          component: service
        annotations:
          summary: "Health check is failing"
          description: "Health check for {{ $labels.check_name }} has been failing"

  # 缓存告警规则
  - name: cache_alerts
    interval: 30s
    rules:
      # 缓存命中率低告警
      - alert: LowCacheHitRate
        expr: |
          (
            rate(cache_hits_total[5m]) 
            / 
            (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))
          ) < 0.70
        for: 10m
        labels:
          severity: info
          component: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} (threshold: 70%)"

      # 缓存容量告警
      - alert: CacheNearCapacity
        expr: |
          (
            cache_size 
            / 
            cache_capacity
          ) > 0.90
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: "Cache near capacity"
          description: "Cache usage is {{ $value | humanizePercentage }} (threshold: 90%)"

  # 数据库告警规则 (如果使用)
  - name: database_alerts
    interval: 30s
    rules:
      # 数据库连接数告警
      - alert: HighDatabaseConnections
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "High database connection count"
          description: "Database has {{ $value }} active connections (threshold: 80)"

      # 数据库查询慢告警
      - alert: SlowDatabaseQueries
        expr: |
          histogram_quantile(0.95, 
            rate(database_query_duration_seconds_bucket[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "P95 query time is {{ $value | humanizeDuration }} (threshold: 1s)"

  # 模型告警规则
  - name: model_alerts
    interval: 30s
    rules:
      # 模型加载失败告警
      - alert: ModelLoadFailure
        expr: model_load_errors_total > 0
        for: 1m
        labels:
          severity: critical
          component: model
        annotations:
          summary: "Model load failure detected"
          description: "Failed to load model: {{ $labels.model_name }}"

      # 模型版本不匹配告警
      - alert: ModelVersionMismatch
        expr: model_version_mismatch_total > 0
        for: 5m
        labels:
          severity: warning
          component: model
        annotations:
          summary: "Model version mismatch detected"
          description: "Model version mismatch for {{ $labels.model_name }}"

  # 业务指标告警规则
  - name: business_alerts
    interval: 1m
    rules:
      # 异常流量告警
      - alert: AbnormalTraffic
        expr: |
          abs(
            rate(http_requests_total[5m]) 
            - 
            rate(http_requests_total[5m] offset 1h)
          ) / rate(http_requests_total[5m] offset 1h) > 0.50
        for: 10m
        labels:
          severity: info
          component: business
        annotations:
          summary: "Abnormal traffic pattern detected"
          description: "Traffic changed by {{ $value | humanizePercentage }} compared to 1 hour ago"

      # 用户错误率增加告警
      - alert: IncreasingUserErrors
        expr: |
          rate(http_requests_failed_total{status_code=~"4.."}[5m]) 
          > 
          1.5 * rate(http_requests_failed_total{status_code=~"4.."}[5m] offset 1h)
        for: 10m
        labels:
          severity: warning
          component: business
        annotations:
          summary: "Increasing user error rate"
          description: "User error rate increased by more than 50% compared to 1 hour ago"

  # SLA告警规则
  - name: sla_alerts
    interval: 1m
    rules:
      # 可用性SLA违反告警
      - alert: AvailabilitySLAViolation
        expr: |
          (
            1 - (
              rate(http_requests_failed_total[1h]) 
              / 
              rate(http_requests_total[1h])
            )
          ) < 0.999
        for: 5m
        labels:
          severity: critical
          component: sla
        annotations:
          summary: "Availability SLA violation"
          description: "Availability is {{ $value | humanizePercentage }} (SLA: 99.9%)"

      # 性能SLA违反告警
      - alert: PerformanceSLAViolation
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket[1h])
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          component: sla
        annotations:
          summary: "Performance SLA violation"
          description: "P95 latency is {{ $value | humanizeDuration }} (SLA: 500ms)"
